<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 630"
     width="1200" height="630"
     font-family="'Plus Jakarta Sans', system-ui, sans-serif">
  <defs>
    <!-- Gradient: deep navy with a subtle bloom toward the top-right -->
    <radialGradient id="bg" cx="78%" cy="22%" r="85%">
      <stop offset="0%"  stop-color="#1c476a"/>
      <stop offset="55%" stop-color="#0e2547"/>
      <stop offset="100%" stop-color="#060b38"/>
    </radialGradient>

    <!-- Faint paper-grain texture via overlapping circles, alpha-masked -->
    <pattern id="grain" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="rgba(255,255,255,0.06)"/>
      <circle cx="4" cy="4" r="0.4" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- Decorative low-poly accents bottom-left -->
  <g opacity="0.18" fill="#97bcd7">
    <polygon points="-20,540 130,500 110,630 -20,630"/>
    <polygon points="110,500 220,540 200,630 110,630" opacity="0.7"/>
    <polygon points="200,560 290,540 290,630 200,630" opacity="0.5"/>
  </g>

  <!-- Decorative low-poly accents top-right -->
  <g opacity="0.16" fill="#cadbe5">
    <polygon points="1080,0 1200,0 1200,90 1100,60"/>
    <polygon points="1100,60 1200,90 1200,160 1080,120" opacity="0.7"/>
  </g>

  <!-- Logo + wordmark, top-left -->
  <g transform="translate(80, 80)">
    <!-- Wombat mark, scaled from the 100x100 logo -->
    <g transform="scale(0.7)" fill="#cadbe5">
      <polygon points="56,38 82,46 88,64 80,82 60,86 44,80 38,64 44,48" opacity="0.92"/>
      <polygon points="50,72 72,76 78,82 60,86 44,80" opacity="0.62"/>
      <polygon points="38,52 56,38 60,52 50,62 38,64" opacity="0.78"/>
      <polygon points="14,58 26,46 38,52 38,64 30,72 18,72" opacity="0.96"/>
      <polygon points="6,62 14,58 18,72 12,74" opacity="0.84"/>
      <polygon points="26,46 38,52 38,64 30,58" opacity="0.7"/>
      <polygon points="22,40 30,40 28,50 22,48" opacity="0.86"/>
      <polygon points="34,38 42,40 40,48 34,46" opacity="0.74"/>
      <polygon points="24,56 28,54 30,58 26,60" opacity="1"/>
      <polygon points="6,62 12,62 12,68 6,68" opacity="1"/>
      <polygon points="40,80 48,82 50,90 42,90" opacity="0.9"/>
      <polygon points="64,84 74,84 76,92 66,92" opacity="0.84"/>
    </g>
    <!-- Wordmark next to the wombat -->
    <text x="92" y="48" font-family="'Fraunces', Georgia, serif"
          font-size="34" font-weight="400" fill="#ffffff"
          letter-spacing="-0.5">
      Wombat Home Loans
    </text>
  </g>

  <!-- Main message, vertically centred-ish -->
  <text x="80" y="320"
        font-family="'Fraunces', Georgia, serif"
        font-size="76" font-weight="300"
        fill="#ffffff"
        letter-spacing="-2">
    Your mortgage shouldn’t feel
  </text>
  <text x="80" y="408"
        font-family="'Fraunces', Georgia, serif"
        font-size="76" font-weight="300"
        font-style="italic"
        fill="#97bcd7"
        letter-spacing="-2">
    like your problem to solve.
  </text>

  <!-- Sub-line -->
  <text x="80" y="478"
        font-size="24"
        font-weight="500"
        fill="rgba(202, 219, 229, 0.85)"
        letter-spacing="0.2">
    Sydney mortgage broker for expats and complex finance.
  </text>

  <!-- Trust strip across the bottom -->
  <g transform="translate(80, 540)" font-size="16" font-weight="600"
     fill="#cadbe5" letter-spacing="2">
    <text y="0" opacity="0.85">20+ YEARS BANKING</text>
    <text x="260" y="0" opacity="0.85">·</text>
    <text x="280" y="0" opacity="0.85">40+ LENDERS</text>
    <text x="450" y="0" opacity="0.85">·</text>
    <text x="470" y="0" opacity="0.85">5.0 GOOGLE RATING</text>
    <text x="710" y="0" opacity="0.85">·</text>
    <text x="730" y="0" opacity="0.85">ACL 561324</text>
  </g>

  <!-- URL bottom-right -->
  <text x="1120" y="580" text-anchor="end"
        font-family="'Fraunces', Georgia, serif"
        font-size="22" fill="#97bcd7" font-style="italic">
    wombatloans.com.au
  </text>
</svg>
