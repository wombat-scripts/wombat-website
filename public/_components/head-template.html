<!--
  ============================================================================
  WOMBAT HOME LOANS — REUSABLE <head> TEMPLATE
  ============================================================================

  Phase 2 deliverable. Paste the relevant block into each page's <head>.

  Tokens to replace per page (search for {{TOKEN}}):
    {{PAGE_TITLE}}        — page title (55–60 chars max for SERPs)
    {{PAGE_DESCRIPTION}}  — meta description (150–160 chars max)
    {{PAGE_PATH}}         — path with leading slash, e.g. "/podcast.html"
                             use "/" for the homepage
    {{PAGE_TYPE}}         — Open Graph type: "website" for most pages,
                             "article" for article pages
    {{OG_IMAGE}}          — absolute URL of OG image (default: og-image.jpg)

  For ARTICLE pages, also replace:
    {{ARTICLE_TITLE}}
    {{ARTICLE_DESCRIPTION}}
    {{ARTICLE_PUBLISHED}} — ISO 8601 date, e.g. "2026-04-15"
    {{ARTICLE_MODIFIED}}  — ISO 8601 date
    {{ARTICLE_IMAGE}}     — absolute URL of article hero image

  For FAQ pages, replace the FAQ schema block with real Q&A pairs.

  ============================================================================
-->


<!--
  ============================================================================
  SECTION 1 — UNIVERSAL HEAD (every page gets this)
  ============================================================================
-->

<!-- Charset & viewport -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Primary meta -->
<title>{{PAGE_TITLE}} | Wombat Home Loans</title>
<meta name="description" content="{{PAGE_DESCRIPTION}}">

<link rel="icon" type="image/svg+xml" href="/assets/logo.svg">

<!--
  ============================================================================
  SECTION 3 — FAQ SCHEMA (homepage only; remove from other pages)
  ============================================================================
  Edit Q&A pairs as the homepage FAQ section is finalised in Phase 3.
-->

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Does it cost anything to use a mortgage broker?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Wombat Home Loans is paid by the lender when your loan settles. There is no cost to the borrower. Under Australia's Best Interests Duty, brokers are legally required to act in your interests."
      }
    },
    {
      "@type": "Question",
      "name": "Can you help if I'm an Australian living overseas?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. This is one of Wombat's specialist areas. Tom works with Australian expats in the UK, US, Singapore, Hong Kong, the UAE, and elsewhere who are buying investment property back home or planning their return."
      }
    },
    {
      "@type": "Question",
      "name": "Can you help if I have foreign income?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Different lenders treat foreign income very differently — some accept 100% of GBP or USD income, others apply heavy haircuts, others won't consider it at all. Tom's specialty is matching your income profile to lenders that will recognise it properly."
      }
    },
    {
      "@type": "Question",
      "name": "How many lenders do you work with?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "40+ lenders, covering the big four banks, second-tier banks, non-bank lenders, and specialist lenders for non-standard cases."
      }
    },
    {
      "@type": "Question",
      "name": "Are you Australia-wide or just Sydney?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Australia-wide via Zoom. Tom is based in Beecroft, Sydney, but the majority of meetings are remote."
      }
    }
  ]
}
</script>
