<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wombat Home Loans — low-poly wombat mark.
  Single colour via `currentColor` so it inherits from CSS.
  ViewBox 0 0 100 100 — square, scales to any size.

  Usage:
    <img src="/assets/logo.svg" alt="Wombat Home Loans" width="36" height="36">
  Or inline, with colour control:
    <span style="color:#1c476a"><svg .../></span>
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     role="img"
     aria-label="Wombat Home Loans"
     fill="currentColor">
  <title>Wombat Home Loans</title>

  <!-- Body / haunch — broad rounded rump on the right -->
  <polygon points="56,38 82,46 88,64 80,82 60,86 44,80 38,64 44,48"
           opacity="0.92"/>

  <!-- Belly underplate — slightly lighter facet -->
  <polygon points="50,72 72,76 78,82 60,86 44,80"
           opacity="0.62"/>

  <!-- Shoulder facet -->
  <polygon points="38,52 56,38 60,52 50,62 38,64"
           opacity="0.78"/>

  <!-- Head — to the left, lower than the shoulder -->
  <polygon points="14,58 26,46 38,52 38,64 30,72 18,72"
           opacity="0.96"/>

  <!-- Snout / nose facet -->
  <polygon points="6,62 14,58 18,72 12,74"
           opacity="0.84"/>

  <!-- Cheek facet -->
  <polygon points="26,46 38,52 38,64 30,58"
           opacity="0.7"/>

  <!-- Left ear -->
  <polygon points="22,40 30,40 28,50 22,48"
           opacity="0.86"/>

  <!-- Right ear (further/back, smaller) -->
  <polygon points="34,38 42,40 40,48 34,46"
           opacity="0.74"/>

  <!-- Eye — small dark facet inside the head -->
  <polygon points="24,56 28,54 30,58 26,60"
           opacity="1"/>

  <!-- Nose tip -->
  <polygon points="6,62 12,62 12,68 6,68"
           opacity="1"/>

  <!-- Front paw / leg planted on the ground -->
  <polygon points="40,80 48,82 50,90 42,90"
           opacity="0.9"/>

  <!-- Back paw -->
  <polygon points="64,84 74,84 76,92 66,92"
           opacity="0.84"/>

  <!-- Subtle ground shadow — same colour, very low opacity, anchors the figure -->
  <polygon points="6,92 94,92 88,96 12,96"
           opacity="0.18"/>
</svg>
