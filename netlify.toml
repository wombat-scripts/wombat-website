# Netlify configuration for Wombat Home Loans
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "_site"
  command = "npm install && npm run build && npx pagefind --site _site"

[functions]
  directory = "netlify/functions"

# ─────────────────────────────────────────────────────────────────────
# REDIRECTS
# ─────────────────────────────────────────────────────────────────────

[[redirects]]
  from = "https://wombatloans.com.au/*"
  to = "https://wombathomeloans.com.au/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.wombatloans.com.au/*"
  to = "https://wombathomeloans.com.au/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://wombatlending.com.au/*"
  to = "https://wombathomeloans.com.au/:splat"
  status = 301
  force = true
  
[[redirects]]
  from = "https://www.wombatlending.com.au/*"
  to = "https://wombathomeloans.com.au/:splat"
  status = 301
  force = true
  
[[redirects]]
  from = "https://wombatfinancial.com.au/*"
  to = "https://wombathomeloans.com.au/:splat"
  status = 301
  force = true
  
[[redirects]]
  from = "https://www.wombatfinancial.com.au/*"
  to = "https://wombathomeloans.com.au/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.wombathomeloans.com.au/*"
  to = "https://wombathomeloans.com.au/:splat"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────
# HEADERS — security and performance
# ─────────────────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
